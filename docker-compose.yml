services:
  api:
    build: .
    ports:
      - "${PORT:-4000}:4000"
    environment:
      NODE_ENV: production
      PORT: ${PORT:-4000}
      MONGODB_URI: ${MONGODB_URI:-mongodb://mongo:27017/url_shortner}
      JWT_SECRET: ${JWT_SECRET:-url_shortener_jwt_secret}
      BASE_URL: ${BASE_URL:-http://localhost:4000}
    depends_on:
      - mongo
    restart: unless-stopped

  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    restart: unless-stopped

volumes:
  mongo_data:
